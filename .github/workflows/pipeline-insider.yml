name: Insider Pipeline (SEC Form 4)

on:
  schedule:
    # Runs every 2 hours UTC
    - cron: '0 */2 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub Actions UI

jobs:
  run-insider-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test EDGAR connectivity
        run: |
          python -c "
          import urllib.request, json
          from datetime import date
          today = date.today().isoformat()
          url = f'https://efts.sec.gov/LATEST/search-index?q=%22%22&forms=4&dateRange=custom&startdt={today}&enddt={today}'
          req = urllib.request.Request(url, headers={'User-Agent': 'Evenfield contact@evenfield.app'})
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  data = json.loads(r.read())
                  hits = data.get('hits', {}).get('total', {}).get('value', 0)
                  print(f'SUCCESS: {hits} filings found for {today}')
          except Exception as e:
              print(f'FAILED: {e}')
          "

      - name: Run Form 4 pipeline
        timeout-minutes: 10
        run: python pipeline.py --once
        env:
          PYTHONUNBUFFERED: "1"

      - name: Check pipeline output
        run: |
          echo "Working directory: $(pwd)"
          echo "Files in current directory:"
          ls -la *.json 2>/dev/null || echo "No JSON files found"
          echo "evenfield_filings.json line count:"
          wc -l evenfield_filings.json 2>/dev/null || echo "File does not exist"

      - name: Run enrichment (insider)
        run: python enrichment.py insider
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Upload enriched data to Supabase Storage
        run: python scripts/upload_to_supabase.py evenfield_enriched.json
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Trigger Vercel production deploy
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK" ]; then
            echo "ERROR: VERCEL_DEPLOY_HOOK secret is empty or not set"
            exit 1
          fi
          echo "Triggering Vercel deploy..."
          HTTP_CODE=$(curl -s -o /tmp/vercel_response.txt -w "%{http_code}" -X POST "$VERCEL_DEPLOY_HOOK")
          cat /tmp/vercel_response.txt
          echo "HTTP response code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "ERROR: Vercel deploy hook returned $HTTP_CODE"
            exit 1
          fi
          echo "Vercel deploy triggered successfully"
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
